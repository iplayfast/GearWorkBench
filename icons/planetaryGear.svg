<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="64"
   height="64"
   viewBox="0 0 64 64"
   version="1.1">
  <defs>
    <style type="text/css">
      .gear-body { fill:#4a90e2; stroke:#2c5aa0; stroke-width:1.5; }
      .gear-ring { fill:none; stroke:#4a90e2; stroke-width:3; }
    </style>
  </defs>

  <g transform="translate(32,32)">
    <!-- Ring gear outline -->
    <circle cx="0" cy="0" r="26" class="gear-ring" />

    <!-- Sun gear center -->
    <circle cx="0" cy="0" r="5" class="gear-body" />

    <!-- Planet gears -->
    <g class="gear-body">
      <circle cx="0" cy="-14" r="4" />
      <circle cx="12.1" cy="7" r="4" />
      <circle cx="-12.1" cy="7" r="4" />
    </g>
  </g>
</svg>
