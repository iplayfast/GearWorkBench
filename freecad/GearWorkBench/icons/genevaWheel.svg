<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" version="1.1">
  <defs>
    <style type="text/css">
      .wheel { fill:#4a90e2; stroke:#2c5aa0; stroke-width:2; stroke-linejoin:round; }
      .slot { fill:#ffffff; stroke:#2c5aa0; stroke-width:1; }
      .pin { fill:#e05050; stroke:#8a2c2c; stroke-width:1.5; }
      .hole { fill:#ffffff; }
    </style>
  </defs>

  <!-- Geneva Wheel body -->
  <g transform="translate(32,32)">
    <!-- Main disc -->
    <circle cx="0" cy="0" r="26" class="wheel"/>

    <!-- 4 radial slots at 0, 90, 180, 270 degrees -->
    <rect x="-2.5" y="-27" width="5" height="14" rx="2.5" class="slot"/>
    <rect x="-2.5" y="13" width="5" height="14" rx="2.5" class="slot"/>
    <rect x="-27" y="-2.5" width="14" height="5" rx="2.5" class="slot"/>
    <rect x="13" y="-2.5" width="14" height="5" rx="2.5" class="slot"/>

    <!-- Stop arc cuts between slots (concave notches) -->
    <circle cx="14" cy="-14" r="7" class="slot" opacity="0.6"/>
    <circle cx="14" cy="14" r="7" class="slot" opacity="0.6"/>
    <circle cx="-14" cy="14" r="7" class="slot" opacity="0.6"/>
    <circle cx="-14" cy="-14" r="7" class="slot" opacity="0.6"/>

    <!-- Center hole -->
    <circle cx="0" cy="0" r="4" class="hole" stroke="#2c5aa0" stroke-width="1.5"/>

    <!-- Drive pin (outside wheel, indicating crank) -->
    <circle cx="22" cy="-22" r="3" class="pin"/>
  </g>
</svg>
